# ============================================================================
# miman — LetA deployment profile (Qdrant-native, spec 03-M §5.4)
# ============================================================================
# miman + qdrant + appdb. Headless (no dashboard — admin access is
# ADMIN_API_KEY/admin JWT via finmem-admin, spec §5.4). Binds only to
# 127.0.0.1; qdrant/appdb have no host ports at all.
# ============================================================================

name: miman

services:

  miman:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        IMAGE_SOURCE: https://github.com/LetA-Tech/miman
        IMAGE_REVISION: ${IMAGE_REVISION:-dev-local}
        IMAGE_VERSION: ${IMAGE_VERSION:-dev-local}
    image: miman:${IMAGE_VERSION:-dev-local}
    container_name: miman
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      # Container-network identity — not operator-configurable via .env
      # (must match the appdb/qdrant service names below).
      - POSTGRES_HOST=appdb
      - POSTGRES_PORT=5432
      # db.py reads APP_DB_NAME, not POSTGRES_DB (that var only bootstraps
      # the appdb container's initial database) — bridge them here so both
      # sides agree on the same database name.
      - APP_DB_NAME=${POSTGRES_DB:?set POSTGRES_DB in deploy/.env}
      - POSTGRES_USER=${POSTGRES_USER:?set POSTGRES_USER in deploy/.env}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/.env}
    depends_on:
      qdrant:
        condition: service_healthy
      appdb:
        condition: service_healthy
    # python:3.12-slim ships no wget/curl either — same class of bug as the
    # qdrant healthcheck fix. Reuse the interpreter that's guaranteed present.
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3).read()"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    networks:
      - miman-net

  qdrant:
    image: qdrant/qdrant:v1.18.2-unprivileged
    container_name: miman-qdrant
    restart: unless-stopped
    # No host ports — reached only by the miman container on the internal network.
    environment:
      - QDRANT__SERVICE__HOST=0.0.0.0
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      # mandatory, not left optional: qdrant treats an env-var-present-but-empty
      # key as "auth on, expect blank key" while the app sends no header at all
      # when its own QDRANT_API_KEY is empty (server/main.py) — that mismatch
      # 401s. Requiring a real key here removes the broken half-configured state.
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:?set QDRANT_API_KEY in deploy/.env}
      - QDRANT__TELEMETRY_DISABLED=true
    volumes:
      - qdrant_storage:/qdrant/storage
    # unprivileged qdrant image ships no wget/curl; bash's /dev/tcp is the only
    # HTTP-capable tool present.
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/6333 && printf 'GET /healthz HTTP/1.0\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q 200"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    networks:
      - miman-net

  appdb:
    image: postgres:18-alpine
    container_name: miman-appdb
    restart: unless-stopped
    # miman's own app DB (auth users/API keys, request logs, alembic) — not
    # the vector store (spec §5.4: "Qdrant-native" does not mean "no Postgres").
    environment:
      - POSTGRES_USER=${POSTGRES_USER:?set POSTGRES_USER in deploy/.env}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/.env}
      - POSTGRES_DB=${POSTGRES_DB:?set POSTGRES_DB in deploy/.env}
    # postgres:18+ images use a versioned PGDATA subdir; mounting the parent
    # (not .../data) is the image's own required layout as of pg 18 (docker-library/postgres#1259).
    volumes:
      - appdb_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    networks:
      - miman-net

volumes:
  qdrant_storage:
    name: miman_qdrant_storage
  appdb_data:
    name: miman_appdb_data

networks:
  miman-net:
    name: miman_net
    driver: bridge
